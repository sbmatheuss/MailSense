services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mailsense}
      POSTGRES_USER: ${POSTGRES_USER:-mailsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailsense}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailsense}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker --loglevel=info --concurrency=2

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
